<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Orlando vs Pelicanul</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    #hud {
        position: fixed;
        top: 10px;
        width: 100%;
        font-size: 22px;
        z-index: 10;
    }

    #gameArea {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    .target {
        position: absolute;
        width: 120px;
        height: 150px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding-top: 5px;
        color: black;
        font-weight: bold;
        border: 3px solid white;
    }

    .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 5px;
    }
</style>
</head>

<body>

<div id="hud">
    Scor: <span id="score">0</span> |
    Gloanțe: <span id="ammo">30</span> |
    Timp: <span id="time">20</span>
</div>

<div id="gameArea">

    <div id="orlando" class="target">
        <img src="FB_IMG_1776274065002.jpg" class="avatar">
        Orlando
    </div>

    <div id="pelicanul" class="target">
        <img src="images.jpeg" class="avatar">
        Pelicanul
    </div>

    <div id="cristian" class="target">
        <img src="20260415_164254.jpg" class="avatar">
        Cristian
    </div>

</div>

<script>
let score = 0;
let ammo = 30;
let timeLeft = 20;

const orlando = document.getElementById("orlando");
const pelicanul = document.getElementById("pelicanul");
const cristian = document.getElementById("cristian");

let moveInterval;
let gameInterval;

function randomPosition(target) {
    const area = document.getElementById("gameArea");
    const maxX = area.clientWidth - 120;
    const maxY = area.clientHeight - 150;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    target.style.left = x + "px";
    target.style.top = y + "px";
}

function shoot(targetName, element) {
    if (ammo <= 0) return;

    ammo--;
    document.getElementById("ammo").textContent = ammo;

    if (targetName === "pelicanul") score++;
    if (targetName === "orlando") score--;
    if (targetName === "cristian") score--;

    document.getElementById("score").textContent = score;
}

orlando.onclick = () => shoot("orlando", orlando);
pelicanul.onclick = () => shoot("pelicanul", pelicanul);
cristian.onclick = () => shoot("cristian", cristian);

function startMovingTargets() {
    moveInterval = setInterval(() => {
        randomPosition(orlando);
        randomPosition(pelicanul);
        randomPosition(cristian);
    }, 600);
}

function startGameTimer() {
    gameInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time").textContent = timeLeft;

        if (timeLeft <= 0 || ammo <= 0) {
            endGame();
        }
    }, 1000);
}

function endGame() {
    clearInterval(moveInterval);
    clearInterval(gameInterval);
    alert("Joc terminat! Scor final: " + score);
}

function randomColor() {
    const colors = ["red", "yellow", "blue", "orange", "purple", "green"];
    return colors[Math.floor(Math.random() * colors.length)];
}

setInterval(() => {
    orlando.style.background = randomColor();
    pelicanul.style.background = randomColor();
    cristian.style.background = randomColor();
}, 500);

startMovingTargets();
startGameTimer();
</script>

</body>
</html>
