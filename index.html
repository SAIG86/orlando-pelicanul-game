<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tot la zi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--ro-blue:#002B7F;--ro-yellow:#FCD116;--ro-red:#CE1126}
body{margin:0;background:#060a1a;color:#fff;font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden}
.fh{font-family:'Outfit',sans-serif}
.gc{position:relative;overflow:hidden;background:rgba(255,255,255,.03);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:2rem;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:.3s}
.gc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--ro-blue) 0%,var(--ro-yellow) 50%,var(--ro-red) 100%);opacity:.7}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,43,127,.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(206,17,38,.3) 0%,transparent 50%),#060a1a}
.ss::-webkit-scrollbar{width:6px}.ss::-webkit-scrollbar-thumb{background:rgba(252,209,22,.3);border-radius:999px}
.pill{padding:.35rem .8rem;border-radius:999px;font-size:.75rem;font-weight:500;transition:.2s;cursor:pointer;border:none}
.pill-a{background:var(--ro-yellow);color:#000}
.pill-i{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.zbtn{padding:.4rem;border-radius:.75rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:.2s;text-align:center}
.zbtn-a{background:linear-gradient(135deg,var(--ro-blue),var(--ro-red));border-color:var(--ro-yellow);color:#fff}
</style>
</head>
<body>
<div class="bg"></div>
<div class="relative z-10 w-full min-h-screen p-4 md:p-8">
<div class="mx-auto max-w-7xl grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-6">

<div class="md:col-span-8">
<div class="gc p-6 md:p-10 h-full flex flex-col justify-center pl-8">
<p class="text-white/60 text-sm uppercase tracking-[.25em]" id="greet">Salut</p>
<div class="fh font-light tracking-tighter leading-none mt-2" style="font-size:clamp(4rem,12vw,10rem)"><span id="hh">--</span><span style="color:var(--ro-yellow)">:</span><span id="mm">--</span><span class="text-4xl align-top ml-2" style="color:var(--ro-red)" id="ss">--</span></div>
<p class="mt-2 text-white/80 text-lg md:text-2xl" id="dt">...</p>
</div>
</div>

<div class="md:col-span-4">
<div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-white/70 text-xs uppercase tracking-widest mb-4" style="color:var(--ro-yellow)">📍 Vremea</div>
<div id="wcity" class="text-xl font-medium">București</div>
<div class="flex items-end gap-3 mt-2">
<span class="text-6xl font-light text-blue-400" id="wtemp">--</span><span class="text-2xl mb-2">°C</span>
<span id="wico" class="text-4xl ml-auto">☁️</span>
</div>
<div id="wdesc" class="text-white/50 text-sm mt-1">Se încarcă...</div>
<div class="mt-4 pt-4 border-t border-white/10 flex gap-3 overflow-x-auto ss" id="whourly"></div>
</div>
</div>

<div class="md:col-span-4">
<div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest mb-3" style="color:var(--ro-yellow)">📰 Știri Proaspete</div>
<div class="flex flex-wrap gap-1.5 mb-4" id="ntabs"></div>
<ul id="nlist" class="space-y-3 max-h-[400px] overflow-y-auto ss pr-2"></ul>
</div>
</div>

<div class="md:col-span-4">
<div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest mb-3" style="color:var(--ro-yellow)">🏆 Fotbal</div>
<div class="flex flex-wrap gap-1 mb-3" id="flgs"></div>
<div class="flex gap-1.5 mb-4" id="ftabs"></div>
<div id="fbody" class="max-h-[400px] overflow-y-auto ss pr-2"></div>
</div>
</div>

<div class="md:col-span-4">
<div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest mb-3" style="color:var(--ro-yellow)">✨ Zodiac</div>
<div class="grid grid-cols-4 gap-1.5 mb-4" id="zgrid"></div>
<div class="flex gap-1.5 flex-wrap mb-4" id="ztabs"></div>
<div id="zbody" class="max-h-[300px] overflow-y-auto ss pr-2 text-sm text-white/80 italic">Alege o zodie...</div>
</div>
</div>

</div>
<p class="mx-auto max-w-7xl mt-8 text-center text-white/40 text-xs">🇷🇴 Tot la zi v2.5 · Multi-Source RSS · AllOrigins Proxy</p>
</div>

<script>
const FD_KEY='000f99b342a747abbefc9eb7ce8ee6ca';
const PROXY = 'https://api.allorigins.win/raw?url=';

// CLOCK
setInterval(()=>{
    const n=new Date();
    hh.textContent=String(n.getHours()).padStart(2,'0');
    mm.textContent=String(n.getMinutes()).padStart(2,'0');
    ss.textContent=String(n.getSeconds()).padStart(2,'0');
    dt.textContent=n.toLocaleDateString('ro-RO',{weekday:'long',day:'numeric',month:'long'});
},1000);

// WEATHER
async function loadWeather(){
    try{
        const r=await fetch(`https://wttr.in/Bucuresti?format=j1`);
        const d=await r.json();
        const cc=d.current_condition[0];
        wtemp.textContent=cc.temp_C;
        wdesc.textContent=cc.weatherDesc[0].value;
        wico.textContent="☀️"; 
    }catch(e){}
}
loadWeather();

// NEWS (Multi-Source)
const NCATS=[
    {k:'gen',l:'General',u:['https://www.digi24.ro/rss','https://www.hotnews.ro/rss','https://www.libertatea.ro/feed','https://www.news.ro/rss']},
    {k:'sport',l:'Sport',u:['https://www.gsp.ro/rss/index.xml','https://www.prosport.ro/rss','https://www.fanatik.ro/sport/feed']}
];
let ncat='gen';
function rNT(){ntabs.innerHTML=NCATS.map(c=>`<button onclick="sNC('${c.k}')" class="pill ${c.k===ncat?'pill-a':'pill-i'}">${c.l}</button>`).join('')}
function sNC(k){ncat=k;rNT();loadNews()}
async function loadNews(){
    nlist.innerHTML='<li class="text-sm opacity-50">Se caută știri...</li>';
    const cat=NCATS.find(c=>c.k===ncat);
    let allNews=[];
    for(let url of cat.u){
        try{
            const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const d=await r.json();
            if(d.items) allNews = [...allNews, ...d.items.map(i=>({...i, s: d.feed.title}))];
        }catch(e){}
    }
    allNews.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
    nlist.innerHTML=allNews.slice(0,25).map(n=>`<li><a href="${n.link}" target="_blank" class="block group"><p class="text-sm group-hover:text-yellow-400 transition">${n.title}</p><p class="text-[10px] opacity-40 uppercase mt-1">${n.s}</p></a></li>`).join('');
}
rNT();loadNews();

// FOOTBALL
const LGS=[{k:'PL',l:'Anglia'},{k:'PD',l:'Spania'},{k:'SA',l:'Italia'},{k:'BL1',l:'Germania'}];
const FTABS=[{k:'past',l:'Rezultate'},{k:'standings',l:'Clasament'}];
let flg='PL',ftb='past';
function rFT(){
    flgs.innerHTML=LGS.map(l=>`<button onclick="sFL('${l.k}')" class="pill ${l.k===flg?'pill-a':'pill-i'}">${l.l}</button>`).join('');
    ftabs.innerHTML=FTABS.map(t=>`<button onclick="sFT('${t.k}')" class="pill ${t.k===ftb?'pill-a':'pill-i'}">${t.l}</button>`).join('');
}
function sFL(k){flg=k;rFT();loadF()}
function sFT(k){ftb=k;rFT();loadF()}
async function loadF(){
    fbody.innerHTML='...';
    try{
        const r=await fetch(PROXY+encodeURIComponent(`https://api.football-data.org/v4/competitions/${flg}/${ftb==='standings'?'standings':'matches?status=FINISHED'}`),{headers:{'X-Auth-Token':FD_KEY}});
        const d=await r.json();
        if(ftb==='standings'){
            fbody.innerHTML=`<table class="w-full text-xs">` + d.standings[0].table.map(t=>`<tr class="border-b border-white/5"><td class="py-1">${t.position}</td><td>${t.team.shortName}</td><td class="text-right font-bold">${t.points}</td></tr>`).join('') + `</table>`;
        } else {
            fbody.innerHTML=d.matches.slice(-15).reverse().map(m=>`<div class="text-xs py-1 border-b border-white/5 flex justify-between"><span>${m.homeTeam.shortName}-${m.awayTeam.shortName}</span><span class="text-yellow-400 font-bold">${m.score.fullTime.home}:${m.score.fullTime.away}</span></div>`).join('');
        }
    }catch(e){fbody.innerHTML="Eroare API Fotbal";}
}
rFT();loadF();

// HOROSCOPE
const ZS=[{k:'Aries',l:'Berbec',e:'♈'},{k:'Taurus',l:'Taur',e:'♉'},{k:'Gemini',l:'Gemeni',e:'♊'},{k:'Cancer',l:'Rac',e:'♋'},{k:'Leo',l:'Leu',e:'♌'},{k:'Virgo',l:'Fecioară',e:'♍'},{k:'Libra',l:'Balanță',e:'♎'},{k:'Scorpio',l:'Scorpion',e:'♏'},{k:'Sagittarius',l:'Săgetător',e:'♐'},{k:'Capricorn',l:'Capricorn',e:'♑'},{k:'Aquarius',l:'Vărsător',e:'♒'},{k:'Pisces',l:'Pești',e:'♓'}];
const ZT=['daily','weekly','monthly','yearly'];
let zsel=null, zt='daily';
function rZG(){
    zgrid.innerHTML=ZS.map(z=>`<button onclick="sZ('${z.k}')" class="zbtn ${zsel===z.k?'zbtn-a':''}"><div class="text-xl">${z.e}</div><div class="text-[9px]">${z.l}</div></button>`).join('');
    ztabs.innerHTML=ZT.map(t=>`<button onclick="sZT('${t}')" class="pill ${zt===t?'pill-a':'pill-i'}">${t}</button>`).join('');
}
function sZ(k){zsel=k;loadZ()}
function sZT(k){zt=k;loadZ()}
async function loadZ(){
    if(!zsel) return; rZG(); zbody.innerHTML="Se citește în stele...";
    try{
        const r=await fetch(PROXY+encodeURIComponent(`https://horoscope-app-api.vercel.app/api/v1/get-horoscope/${zt}?sign=${zsel}${zt==='daily'?'&day=TODAY':''}`));
        const d=await r.json();
        zbody.innerHTML=d.data.horoscope_data;
    }catch(e){zbody.innerHTML="Eroare Zodiac";}
}
rZG();
</script>
</body>
</html>
