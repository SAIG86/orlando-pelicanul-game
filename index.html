<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tot la zi</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--rb:#002B7F;--ry:#FCD116;--rr:#CE1126}
body{margin:0;background:#060a1a;color:#fff;font-family:'Manrope',sans-serif;min-height:100vh;overflow-x:hidden}
.fh{font-family:'Outfit',sans-serif}
.gc{position:relative;overflow:hidden;background:rgba(255,255,255,.03);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:2rem;box-shadow:0 8px 32px rgba(0,0,0,.4);transition:.3s}
.gc:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.2)}
.gc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--rb) 0%,var(--ry) 50%,var(--rr) 100%);opacity:.7}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,43,127,.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(206,17,38,.3) 0%,transparent 50%),#060a1a}
.ss::-webkit-scrollbar{width:6px}.ss::-webkit-scrollbar-thumb{background:rgba(252,209,22,.3);border-radius:999px}
@keyframes ri{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.ri{animation:ri .7s cubic-bezier(.4,0,.2,1) both}
.pill{padding:.35rem .8rem;border-radius:999px;font-size:.75rem;font-weight:500;cursor:pointer;border:none;transition:.2s}
.pill-a{background:var(--ry);color:#000}
.pill-i{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.pill-i:hover{background:rgba(0,43,127,.4);color:#fff}
.lpill{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:.3rem .7rem;border-radius:999px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.lpill-a{background:var(--rr);color:#fff}
.lpill-i{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5)}
.lpill-i:hover{background:rgba(0,43,127,.4);color:#fff}
.zbtn{padding:.4rem;border-radius:.75rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:.2s;text-align:center}
.zbtn:hover{background:rgba(252,209,22,.15);border-color:var(--ry)}
.zbtn-a{background:linear-gradient(135deg,var(--rb),var(--rr));border-color:var(--ry)}
input:focus{outline:none}
</style>
</head>
<body>
<div class="bg"></div>
<div class="relative z-10 w-full min-h-screen p-4 md:p-8">
<div class="mx-auto max-w-7xl grid grid-cols-1 md:grid-cols-12 gap-4 md:gap-6">

<div class="md:col-span-8 ri"><div class="gc p-6 md:p-10 pl-8 h-full flex flex-col justify-center">
<p class="text-white/60 text-sm uppercase tracking-[.25em]" id="greet">Bună</p>
<div class="fh font-light tracking-tighter leading-none mt-2" style="font-size:clamp(4rem,12vw,10rem)"><span id="hh">--</span><span style="color:var(--ry)">:</span><span id="mm">--</span><span class="text-4xl md:text-5xl align-top ml-2" style="color:var(--rr)" id="ss">--</span></div>
<p class="mt-2 text-white/80 text-lg md:text-2xl fh font-light" id="dt">...</p>
</div></div>

<div class="md:col-span-4 ri"><div class="gc p-6 pl-8 h-full flex flex-col">
<div class="flex items-center justify-between"><div class="text-xs uppercase tracking-widest" style="color:var(--ry)">📍 Vremea</div><button onclick="ws.classList.toggle('hidden')" class="text-white/50 text-xs px-2 py-1 rounded-full hover:bg-white/10">🔍 Oraș</button></div>
<div id="ws" class="hidden mt-3 space-y-2"><div class="flex gap-2"><input id="wsi" placeholder="Caută oraș..." class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-2 text-sm text-white"/><button onclick="sC()" class="bg-white text-black text-sm px-4 py-2 rounded-full">OK</button></div>
<div class="flex gap-2"><button onclick="setC('București',44.4268,26.1025)" class="text-xs px-3 py-1 rounded-full bg-white/5 text-white/80">București</button><button onclick="setC('Pantelimon',44.4497,26.2103)" class="text-xs px-3 py-1 rounded-full bg-white/5 text-white/80">Pantelimon</button></div>
<ul id="wsr" class="space-y-1 max-h-40 overflow-auto ss"></ul></div>
<div class="mt-4 flex items-start justify-between"><div><p class="text-white text-xl fh font-medium" id="wcity">București</p><p class="text-white/50 text-xs mt-0.5" id="wdesc">—</p></div><div class="text-4xl" id="wico">☁️</div></div>
<div class="mt-2 flex items-end gap-3"><span class="fh font-light text-6xl md:text-7xl leading-none" style="color:#60a5fa" id="wtemp">--</span><span class="text-white/60 text-2xl mb-2 fh">°C</span></div>
<div class="mt-2 flex gap-4 text-white/60 text-xs" id="wmeta"></div>
<div class="mt-4 pt-4 border-t border-white/10 flex gap-3 overflow-x-auto ss" id="whourly"></div>
</div></div>

<div class="md:col-span-4 ri"><div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest" style="color:var(--ry)">📰 Știri</div>
<div class="mt-3 flex flex-wrap gap-1.5" id="ntabs"></div>
<ul id="nlist" class="mt-4 space-y-3 max-h-[360px] overflow-y-auto ss pr-1"></ul>
</div></div>

<div class="md:col-span-4 ri"><div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest" style="color:var(--ry)">🏆 Fotbal</div>
<div class="mt-3 flex flex-wrap gap-1" id="flgs"></div>
<div class="mt-4" id="fbody"></div>
</div></div>

<div class="md:col-span-4 ri"><div class="gc p-6 pl-8 h-full flex flex-col">
<div class="text-xs uppercase tracking-widest" style="color:var(--ry)">✨ Horoscop</div>
<div class="mt-3 grid grid-cols-4 gap-1.5" id="zgrid"></div>
<div class="mt-3 flex gap-1.5 flex-wrap" id="ztabs"></div>
<div class="mt-3 max-h-[260px] overflow-y-auto ss pr-1" id="zbody"><p class="text-white/40 text-sm">Alege o zodie ↑</p></div>
</div></div>

<div class="md:col-span-12 ri"><div class="gc p-8 md:p-10 pl-10 relative overflow-hidden">
<div class="absolute -top-4 -left-4 text-[10rem] leading-none opacity-[.06]" style="color:var(--ry)">"</div>
<div class="relative z-10"><p class="text-xs uppercase tracking-[.25em]" style="color:var(--ry)">Citatul zilei</p>
<p class="mt-3 fh font-light text-white/95 text-2xl md:text-3xl italic leading-snug" id="qtext">...</p>
<p class="mt-3 text-sm" style="color:#60a5fa" id="qauthor"></p></div>
</div></div>

</div>
<p class="mx-auto max-w-7xl mt-8 text-center text-white/40 text-xs">🇷🇴 wttr.in · Sofascore · acvaria.com · Digi24/Gândul/GSP/Prosport/Mediafax/Realitatea/EVZ/Cațavencii/Cancan</p>
</div>

<script>
const W=["Duminică","Luni","Marți","Miercuri","Joi","Vineri","Sâmbătă"];
const M=["Ianuarie","Februarie","Martie","Aprilie","Mai","Iunie","Iulie","August","Septembrie","Octombrie","Noiembrie","Decembrie"];
function tick(){const n=new Date();hh.textContent=String(n.getHours()).padStart(2,'0');mm.textContent=String(n.getMinutes()).padStart(2,'0');ss.textContent=String(n.getSeconds()).padStart(2,'0');const h=n.getHours();greet.textContent=h<5?"Noapte bună":h<12?"Bună dimineața":h<18?"Bună ziua":h<22?"Bună seara":"Noapte bună";dt.textContent=`${W[n.getDay()]}, ${n.getDate()} ${M[n.getMonth()]} ${n.getFullYear()}`}
setInterval(tick,1000);tick();

const WICO={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',75:'❄️',80:'🌧️',82:'⛈️',95:'⛈️'};
const W2W={"113":0,"116":2,"119":3,"122":3,"143":45,"176":51,"200":95,"227":71,"248":48,"263":51,"266":51,"293":61,"296":61,"299":63,"302":63,"305":65,"308":65,"323":71,"326":73,"329":73,"332":75,"335":75,"353":80,"356":81,"359":82,"386":95,"389":96,"395":99};
const WD={0:'Senin',2:'Parțial noros',3:'Noros',45:'Ceață',51:'Burniță',61:'Ploaie',63:'Ploaie',65:'Ploaie',71:'Ninsoare',75:'Ninsoare',80:'Ploaie',95:'Furtună'};
let city=JSON.parse(localStorage.getItem('dc')||'null')||{name:'București',lat:44.4268,lon:26.1025};
function setC(n,lat,lon){city={name:n,lat,lon};localStorage.setItem('dc',JSON.stringify(city));ws.classList.add('hidden');wsr.innerHTML='';loadW()}
async function sC(){const q=wsi.value.trim();if(!q)return;try{const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=ro`);const d=await r.json();wsr.innerHTML=(d.results||[]).map(x=>`<li><button onclick="setC('${x.name.replace(/'/g,'')}',${x.latitude},${x.longitude})" class="w-full text-left text-sm px-3 py-2 rounded-xl bg-white/5 hover:bg-white/10">${x.name} <span class="text-white/40">· ${x.admin1||''} ${x.country}</span></button></li>`).join('')}catch{wsr.innerHTML='<li class="text-white/40 text-sm">Eroare</li>'}}
async function loadW(){wcity.textContent=city.name;try{const r=await fetch(`https://wttr.in/${city.lat},${city.lon}?format=j1`);const d=await r.json();const cc=d.current_condition[0];const code=W2W[cc.weatherCode]||3;wtemp.textContent=Math.round(cc.temp_C);wico.textContent=WICO[code]||'☁️';wdesc.textContent=WD[code]||cc.weatherDesc[0].value;wmeta.innerHTML=`<span>💧 ${cc.humidity}%</span><span>💨 ${Math.round(cc.windspeedKmph)} km/h</span><span>Resimțit ${Math.round(cc.FeelsLikeC)}°</span>`;const now=new Date(),nh=now.getHours(),td=now.toISOString().slice(0,10);const hrs=[];for(const day of d.weather.slice(0,2)){for(const h of day.hourly){const hi=parseInt(h.time)/100;if(day.date>td||(day.date===td&&hi>=nh))hrs.push({t:`${String(hi).padStart(2,'0')}:00`,tp:Math.round(h.tempC),c:W2W[h.weatherCode]||3});if(hrs.length>=8)break}if(hrs.length>=8)break}whourly.innerHTML=hrs.map(h=>`<div class="flex flex-col items-center gap-1 min-w-[48px]"><span class="text-white/40 text-[10px]">${h.t}</span><span class="text-lg">${WICO[h.c]||'☁️'}</span><span class="text-white text-sm font-medium">${h.tp}°</span></div>`).join('')}catch{wtemp.textContent='--';wdesc.textContent='Eroare'}}
loadW();setInterval(loadW,600000);

const NCATS=[{k:'generale',l:'Generale',u:['https://www.digi24.ro/rss','https://www.mediafax.ro/rss','https://www.gandul.ro/feed','https://www.realitatea.net/rss/news.xml','https://evz.ro/feed']},{k:'sport',l:'Sport',u:['https://www.gsp.ro/rss/index.xml','https://www.prosport.ro/rss','https://www.digi24.ro/rss/sport']},{k:'politica',l:'Politică',u:['https://www.digi24.ro/rss/politica','https://www.gandul.ro/politica/feed','https://www.mediafax.ro/politic/rss']},{k:'showbiz',l:'Showbiz',u:['https://www.cancan.ro/feed','https://www.catavencii.ro/feed']}];
let ncat='generale';
function rNT(){ntabs.innerHTML=NCATS.map(c=>`<button onclick="sNC('${c.k}')" class="pill ${c.k===ncat?'pill-a':'pill-i'}">${c.l}</button>`).join('')}
function sNC(k){ncat=k;rNT();loadN()}
async function loadN(){nlist.innerHTML='<li class="text-white/40 text-sm">Se încarcă…</li>';const cat=NCATS.find(c=>c.k===ncat);try{const res=await Promise.allSettled(cat.u.map(u=>fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=8`).then(r=>r.json())));let all=[];for(const r of res){if(r.status==='fulfilled'&&r.value.items)for(const it of r.value.items)all.push({...it,src:r.value.feed?.title||''})}all.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));const seen=new Set();all=all.filter(n=>{const t=n.title.toLowerCase();if(seen.has(t))return false;seen.add(t);return true}).slice(0,25);nlist.innerHTML=all.length?all.map(n=>`<li><a href="${n.link}" target="_blank" class="group block"><p class="text-white/90 text-sm">${n.title} <span style="color:var(--ry)">↗</span></p><p class="text-white/40 text-[11px] mt-0.5">${n.src}</p></a></li>`).join(''):'<li class="text-white/40 text-sm">Nicio știre.</li>'}catch{nlist.innerHTML='<li class="text-white/40 text-sm">Eroare.</li>'}}
rNT();loadN();

const LGS=[{k:'152',l:'Liga 1 RO'},{k:'17',l:'Premier L.'},{k:'8',l:'La Liga'},{k:'23',l:'Serie A'},{k:'35',l:'Bundesliga'},{k:'34',l:'Ligue 1'}];
let flg='152';
function rFT(){flgs.innerHTML=LGS.map(l=>`<button onclick="sFL('${l.k}')" class="lpill ${l.k===flg?'lpill-a':'lpill-i'}">${l.l}</button>`).join('')}
function sFL(k){flg=k;rFT();loadF()}
function loadF(){fbody.innerHTML=`<iframe src="https://www.sofascore.com/tournament/${flg}/embed" width="100%" height="520" frameborder="0" scrolling="auto" style="border-radius:1rem;background:#fff" title="Fotbal"></iframe><p class="text-white/40 text-[10px] mt-2">Date oficiale Sofascore: clasament, meciuri live, rezultate</p>`}
rFT();loadF();

const ZS=[{k:'berbec',l:'Berbec',e:'♈'},{k:'taur',l:'Taur',e:'♉'},{k:'gemeni',l:'Gemeni',e:'♊'},{k:'rac',l:'Rac',e:'♋'},{k:'leu',l:'Leu',e:'♌'},{k:'fecioara',l:'Fecioară',e:'♍'},{k:'balanta',l:'Balanță',e:'♎'},{k:'scorpion',l:'Scorpion',e:'♏'},{k:'sagetator',l:'Săgetător',e:'♐'},{k:'capricorn',l:'Capricorn',e:'♑'},{k:'varsator',l:'Vărsător',e:'♒'},{k:'pesti',l:'Pești',e:'♓'}];
const ZTABS=[{k:'zilnic',l:'Zi'},{k:'saptamanal',l:'Săptămână'},{k:'lunar',l:'Lună'},{k:'anual',l:'An'}];
let zsel=null,ztab='zilnic';
function rZG(){zgrid.innerHTML=ZS.map(z=>`<button onclick="sZ('${z.k}')" class="zbtn ${zsel===z.k?'zbtn-a':''}"><div class="text-2xl" style="color:${zsel===z.k?'var(--ry)':'#60a5fa'}">${z.e}</div><div class="text-[10px] text-white/80 mt-0.5">${z.l}</div></button>`).join('');ztabs.innerHTML=zsel?ZTABS.map(t=>`<button onclick="sZT('${t.k}')" class="pill ${t.k===ztab?'pill-a':'pill-i'}">${t.l}</button>`).join(''):''}
function sZ(k){zsel=k;rZG();loadZ()}
function sZT(k){ztab=k;rZG();loadZ()}
function loadZ(){if(!zsel){zbody.innerHTML='<p class="text-white/40 text-sm">Alege o zodie ↑</p>';return}const z=ZS.find(x=>x.k===zsel);const urls={zilnic:`https://www.acvaria.com/horoscop/${zsel}`,saptamanal:`https://www.acvaria.com/horoscop-saptamanal/${zsel}`,lunar:`https://www.acvaria.com/horoscop-lunar/${zsel}`,anual:`https://www.acvaria.com/horoscop-anual/${zsel}`};zbody.innerHTML=`<div class="mb-3"><span class="text-3xl" style="color:var(--ry)">${z.e}</span> <span class="fh text-xl" style="color:#60a5fa">${z.l}</span></div><a href="${urls[ztab]}" target="_blank" class="block p-4 rounded-xl text-center hover:opacity-80 transition" style="background:linear-gradient(135deg,var(--rb),var(--rr))"><p class="text-white fh text-lg">📖 Citește horoscopul ${ZTABS.find(t=>t.k===ztab).l.toLowerCase()}</p><p class="text-white/70 text-xs mt-1">pe acvaria.com ↗</p></a><p class="text-white/40 text-[10px] mt-3 text-center">Site românesc oficial de horoscop</p>`}
rZG();

const QS=[{q:"Singurul mod de a face o treabă grozavă este să iubești ceea ce faci.",a:"Steve Jobs"},{q:"Nu aștepta. Timpul nu va fi niciodată potrivit.",a:"Napoleon Hill"},{q:"Călătoria de o mie de mile începe cu un singur pas.",a:"Lao Tzu"},{q:"Fii tu însuți; toți ceilalți sunt deja ocupați.",a:"Oscar Wilde"},{q:"Succesul nu e final, eșecul nu e fatal: curajul de a continua contează.",a:"Winston Churchill"},{q:"Fii schimbarea pe care vrei să o vezi în lume.",a:"Mahatma Gandhi"},{q:"Dacă poți să visezi, poți să o faci.",a:"Walt Disney"},{q:"Mintea este totul. Ceea ce gândești, aceea devii.",a:"Buddha"},{q:"Nu număra zilele, fă ca zilele să conteze.",a:"Muhammad Ali"},{q:"Dacă vrei să mergi repede, mergi singur. Dacă vrei să ajungi departe, mergi împreună.",a:"Proverb african"}];
const ts=new Date().toISOString().slice(0,10);let h=0;for(const c of ts)h=(h*31+c.charCodeAt(0))>>>0;
const qq=QS[h%QS.length];qtext.textContent=`„${qq.q}"`;qauthor.textContent=`— ${qq.a}`;
</script>
</body>
</html>
